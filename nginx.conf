# 将 pid 文件写入 /tmp 目录，避开 /run 的 root 权限限制
pid /tmp/nginx.pid;

events {}

http {
    # 将所有缓存和临时文件也转移到 /tmp 目录，彻底解决 Hugging Face 非 root 用户的写入权限问题
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server {
        listen 7860;
        
        location / {
            # 目标网站地址
            proxy_pass https://aisle.sh/; 
            
            # 开启 SNI 并在握手时发送正确的服务器名称（代理 HTTPS 网站必填）
            proxy_ssl_server_name on;
            proxy_ssl_name aisle.sh;
            
            # 伪装 Host 头部
            proxy_set_header Host aisle.sh; 
            
            # 伪装来源，突破部分网站的防盗链或 CORS 限制
            proxy_set_header Origin "https://aisle.sh";
            proxy_set_header Referer "https://aisle.sh";
            
            # 传递客户端真实信息
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 自动转换目标网站的重定向链接
            proxy_redirect https://aisle.sh/ /;
        }
    }
}
